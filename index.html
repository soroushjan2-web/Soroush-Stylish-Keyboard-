<!DOCTYPE html>
<html lang="fa">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Stylish Keyboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>⌨️ Stylish Keyboard</h1>

<div class="menu">

<button id="englishBtn">🇺🇸 فونت انگلیسی</button>

<button id="persianBtn">🇮🇷 فونت فارسی</button>

<button id="styleBtn">✨ استایل متن</button>

</div>

<textarea id="inputText"
placeholder="متن خود را بنویسید..."></textarea>

<select id="fontSelect">

<option>انتخاب فونت</option>

<option value="vazir">Vazir</option>

<option value="iransans">IranSans</option>

<option value="poppins">Poppins</option>

<option value="roboto">Roboto</option>

</select>

<div class="buttons">

<button id="copyBtn">📋 کپی</button>

<button id="clearBtn">🗑 پاک کردن</button>

</div>

<div id="output"></div>

</div>

<script src="script.js"></script>

</body>
</html>
